<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer rounded square background -->
  <rect width="100" height="100" rx="22" fill="#0f1117"/>

  <!-- Terminal window panel -->
  <rect x="8" y="14" width="78" height="68" rx="10" fill="#1c2030" stroke="#2a2f42" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="8" y="14" width="78" height="22" rx="10" fill="#252a3d"/>
  <!-- Square off bottom corners of title bar -->
  <rect x="8" y="26" width="78" height="10" fill="#252a3d"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="25" r="5.5" fill="#ff5f57"/>
  <circle cx="40" cy="25" r="5.5" fill="#febc2e"/>
  <circle cx="56" cy="25" r="5.5" fill="#27c840"/>

  <!-- > chevron (left) -->
  <path d="M18 52 L30 61 L18 70" stroke="#4d9ef7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- < chevron (right) -->
  <path d="M68 52 L56 61 L68 70" stroke="#4d9ef7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- / slash (center) -->
  <line x1="51" y1="48" x2="40" y2="74" stroke="#27c840" stroke-width="6" stroke-linecap="round"/>
</svg>
